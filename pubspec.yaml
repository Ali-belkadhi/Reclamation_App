name: reclamation_attijari
description: "Application de gestion des réclamations Attijari."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core: ^3.13.1      # résolu à 3.15.2
  firebase_messaging: ^15.2.5 # résolu à 15.2.10

  # ── Notifications locales (OBLIGATOIRE pour afficher les FCM en foreground) ──
  flutter_local_notifications: ^18.0.1

  # ── HTTP ──────────────────────────────────────────────────────────────────
  http: ^1.2.2

  # ── WebSocket ─────────────────────────────────────────────────────────────
  stomp_dart_client: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/attij-2.jpg
